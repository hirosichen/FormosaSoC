# =============================================================================
# FormosaSoC 腳位擺放配置檔 (Pin Order Configuration)
# =============================================================================
#
# 說明：
#   本檔案定義晶片各邊的訊號腳位擺放順序。
#   OpenLane 將依據此配置進行 I/O 腳位的物理佈局。
#
# 格式：
#   #N  = 北邊 (上方)
#   #S  = 南邊 (下方)
#   #E  = 東邊 (右方)
#   #W  = 西邊 (左方)
#
# 台灣自主 IoT SoC - FormosaSoC ASIC 腳位規劃
# =============================================================================

# =============================================================================
# 北邊 (North) - SPI 與 I2C 通訊介面
# =============================================================================
# 高速串列通訊介面集中於北邊，便於與外部記憶體和感測器連接
#N

# --- SPI 使用者介面 ---
spi_clk
spi_mosi
spi_miso
spi_cs_n

# --- SPI Flash 啟動介面 ---
flash_clk
flash_mosi
flash_miso
flash_cs_n

# --- I2C 匯流排介面（開汲極） ---
i2c_scl
i2c_sda

# =============================================================================
# 南邊 (South) - UART 與 GPIO 通用介面
# =============================================================================
# UART 除錯介面和低速 GPIO 集中於南邊
#S

# --- UART 串列通訊 ---
uart_tx
uart_rx

# --- GPIO 通用輸入輸出（低 8 位元） ---
gpio\[0\]
gpio\[1\]
gpio\[2\]
gpio\[3\]
gpio\[4\]
gpio\[5\]
gpio\[6\]
gpio\[7\]

# --- GPIO 擴展（高位元） ---
gpio\[8\]
gpio\[9\]
gpio\[10\]
gpio\[11\]
gpio\[12\]
gpio\[13\]
gpio\[14\]
gpio\[15\]

# =============================================================================
# 東邊 (East) - 無線射頻介面、PWM 與使用者介面
# =============================================================================
# Wi-Fi/BLE 射頻介面以及 PWM 輸出集中於東邊
#E

# --- GPIO 擴展（Wi-Fi/BLE RF 資料路徑用） ---
gpio\[16\]
gpio\[17\]
gpio\[18\]
gpio\[19\]
gpio\[20\]
gpio\[21\]
gpio\[22\]
gpio\[23\]
gpio\[24\]
gpio\[25\]
gpio\[26\]
gpio\[27\]
gpio\[28\]
gpio\[29\]
gpio\[30\]
gpio\[31\]

# --- PWM 脈寬調變輸出（8 通道） ---
pwm_out\[0\]
pwm_out\[1\]
pwm_out\[2\]
pwm_out\[3\]
pwm_out\[4\]
pwm_out\[5\]
pwm_out\[6\]
pwm_out\[7\]

# --- LED 指示燈 ---
led\[0\]
led\[1\]
led\[2\]
led\[3\]

# --- 使用者按鍵輸入 ---
btn\[0\]
btn\[1\]
btn\[2\]
btn\[3\]

# =============================================================================
# 西邊 (West) - 電源、時鐘、重置與 JTAG 除錯
# =============================================================================
# 電源和控制訊號集中於西邊
#W

# --- 主時鐘輸入 ---
clk_in

# --- 外部重置（低電位有效） ---
rst_n

# --- JTAG 除錯介面 ---
jtag_tck
jtag_tms
jtag_tdi
jtag_tdo
